<svg width="1100" height="280" viewBox="0 0 1100 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Build rhythm graph</title>
  <desc id="desc">A local stylized build rhythm graph for the profile README.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1100" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080D18"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="88" y1="188" x2="1018" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="0.52" stop-color="#FFB000"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <pattern id="grid" width="44" height="34" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 34" stroke="#26324A" stroke-width="1" opacity="0.65"/>
    </pattern>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>
  <rect x="1" y="1" width="1098" height="278" rx="24" fill="url(#panel)" stroke="#26324A" stroke-width="2"/>
  <rect x="70" y="70" width="960" height="150" fill="url(#grid)" opacity="0.85"/>
  <text x="52" y="45" class="sans" font-size="30" font-weight="850" fill="#FFFFFF">Build Rhythm</text>
  <text x="790" y="45" class="mono" font-size="17" fill="#8EA3B8">learn · build · measure · ship</text>

  <path d="M88 190C143 190 142 126 198 126C253 126 252 160 308 160C363 160 363 96 418 96C474 96 472 178 528 178C583 178 584 118 638 118C694 118 694 148 748 148C804 148 803 88 858 88C914 88 912 135 968 135C994 135 1008 116 1018 102" stroke="url(#line)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#FFFFFF" stroke="#0B1020" stroke-width="3">
    <circle cx="88" cy="190" r="7"/>
    <circle cx="198" cy="126" r="7"/>
    <circle cx="308" cy="160" r="7"/>
    <circle cx="418" cy="96" r="7"/>
    <circle cx="528" cy="178" r="7"/>
    <circle cx="638" cy="118" r="7"/>
    <circle cx="748" cy="148" r="7"/>
    <circle cx="858" cy="88" r="7"/>
    <circle cx="968" cy="135" r="7"/>
    <circle cx="1018" cy="102" r="7"/>
  </g>
  <g class="mono" font-size="15" fill="#8EA3B8">
    <text x="78" y="244">Mon</text>
    <text x="188" y="244">Tue</text>
    <text x="298" y="244">Wed</text>
    <text x="408" y="244">Thu</text>
    <text x="518" y="244">Fri</text>
    <text x="628" y="244">Sat</text>
    <text x="738" y="244">Sun</text>
    <text x="840" y="244">Next</text>
    <text x="943" y="244">Again</text>
  </g>
  <text x="52" y="258" class="mono" font-size="17" fill="#00E5FF">One week is 2% of a year. Ship the week.</text>
</svg>
