<svg width="1100" height="260" viewBox="0 0 1100 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">maomaozhe GitHub pulse board</title>
  <desc id="desc">A dark local profile card showing maomaozhe's project focus, languages, and build rhythm.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1100" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.54" stop-color="#111827"/>
      <stop offset="1" stop-color="#160F22"/>
    </linearGradient>
    <linearGradient id="edge" x1="38" y1="20" x2="1062" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="0.48" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#FFB000"/>
    </linearGradient>
    <filter id="softGlow" x="-15%" y="-25%" width="130%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00 0 0 0 0 0.90 0 0 0 0 1.00 0 0 0 0.45 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <rect x="1" y="1" width="1098" height="258" rx="24" fill="url(#panel)" stroke="url(#edge)" stroke-width="2"/>
  <path d="M28 198C163 137 274 152 348 228L380 260H28V198Z" fill="#00E5FF" opacity="0.08"/>
  <path d="M782 0C837 86 946 124 1100 94V0H782Z" fill="#FFB000" opacity="0.10"/>

  <text x="48" y="58" class="sans" font-size="32" font-weight="850" fill="#FFFFFF">GitHub Pulse</text>
  <text x="48" y="92" class="mono" font-size="18" fill="#8EA3B8">local card · no broken third-party stats · built for the profile README</text>

  <g transform="translate(48 124)">
    <rect width="222" height="92" rx="18" fill="#0D1324" stroke="#26324A"/>
    <text x="22" y="34" class="mono" font-size="15" fill="#8EA3B8">PRIMARY MODE</text>
    <text x="22" y="67" class="sans" font-size="26" font-weight="800" fill="#00E5FF">Backend Builder</text>
  </g>

  <g transform="translate(292 124)">
    <rect width="222" height="92" rx="18" fill="#0D1324" stroke="#26324A"/>
    <text x="22" y="34" class="mono" font-size="15" fill="#8EA3B8">CURRENT VECTOR</text>
    <text x="22" y="67" class="sans" font-size="26" font-weight="800" fill="#FFB000">AI Tooling</text>
  </g>

  <g transform="translate(536 124)">
    <rect width="222" height="92" rx="18" fill="#0D1324" stroke="#26324A"/>
    <text x="22" y="34" class="mono" font-size="15" fill="#8EA3B8">SYSTEMS TRACK</text>
    <text x="22" y="67" class="sans" font-size="26" font-weight="800" fill="#B794F4">Distributed</text>
  </g>

  <g transform="translate(780 124)">
    <rect width="272" height="92" rx="18" fill="#0D1324" stroke="#26324A"/>
    <text x="22" y="34" class="mono" font-size="15" fill="#8EA3B8">BUILD RHYTHM</text>
    <text x="22" y="67" class="sans" font-size="26" font-weight="800" fill="#FFFFFF">Ship the week</text>
  </g>

  <g class="mono" font-size="18" filter="url(#softGlow)">
    <circle cx="848" cy="56" r="6" fill="#00E5FF"/>
    <text x="866" y="62" fill="#C9D1D9">Java</text>
    <circle cx="930" cy="56" r="6" fill="#FFB000"/>
    <text x="948" y="62" fill="#C9D1D9">Python</text>
    <circle cx="1040" cy="56" r="6" fill="#7C3AED"/>
    <text x="1058" y="62" text-anchor="end" fill="#C9D1D9">Go</text>
    <path d="M846 82H1052" stroke="#26324A"/>
    <circle cx="848" cy="105" r="6" fill="#3178C6"/>
    <text x="866" y="111" fill="#C9D1D9">TypeScript</text>
    <circle cx="990" cy="105" r="6" fill="#41B883"/>
    <text x="1008" y="111" fill="#C9D1D9">Vue</text>
  </g>
</svg>
