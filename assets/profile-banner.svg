<svg width="1400" height="460" viewBox="0 0 1400 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">maomaozhe GitHub profile banner</title>
  <desc id="desc">A dark neon coding dashboard banner for maomaozhe.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070B16"/>
      <stop offset="0.45" stop-color="#10172A"/>
      <stop offset="1" stop-color="#17111F"/>
    </linearGradient>
    <linearGradient id="stroke" x1="150" y1="48" x2="1250" y2="415" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#FFB000"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="185" y1="115" x2="840" y2="115" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.45" stop-color="#CFFAFF"/>
      <stop offset="1" stop-color="#FFCB5C"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00 0 0 0 0 0.90 0 0 0 0 1.00 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" stroke="#26324A" stroke-width="1" opacity="0.42"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { font-size: 22px; letter-spacing: 0; }
      .chip { font-size: 24px; font-weight: 700; }
      .code { font-size: 23px; }
    </style>
  </defs>

  <rect width="1400" height="460" rx="34" fill="url(#bg)"/>
  <rect width="1400" height="460" rx="34" fill="url(#grid)" opacity="0.88"/>

  <path d="M1030 0C975 83 1006 148 1081 194C1188 260 1288 264 1400 215V0H1030Z" fill="#00E5FF" opacity="0.10"/>
  <path d="M0 375C134 315 234 330 324 415C339 429 353 444 368 460H0V375Z" fill="#FFB000" opacity="0.12"/>
  <path d="M1010 412C1149 346 1264 347 1400 409V460H1010V412Z" fill="#7C3AED" opacity="0.16"/>

  <rect x="62" y="52" width="1276" height="356" rx="28" fill="#0B1020" opacity="0.72" stroke="url(#stroke)" stroke-width="2"/>
  <rect x="86" y="76" width="378" height="39" rx="19.5" fill="#111827" stroke="#26324A"/>
  <circle cx="118" cy="95.5" r="7" fill="#FF5F57"/>
  <circle cx="145" cy="95.5" r="7" fill="#FFBD2E"/>
  <circle cx="172" cy="95.5" r="7" fill="#28C840"/>
  <text x="207" y="103" class="mono tiny" fill="#8EA3B8">~/github/maomaozhe</text>

  <g filter="url(#glow)">
    <path d="M1082 110H1204L1264 214L1204 318H1082L1022 214L1082 110Z" stroke="#00E5FF" stroke-width="4" opacity="0.95"/>
    <path d="M1119 158H1167L1191 200L1167 242H1119L1095 200L1119 158Z" stroke="#FFB000" stroke-width="4" opacity="0.95"/>
    <path d="M1130 288H1238" stroke="#7C3AED" stroke-width="7" stroke-linecap="round"/>
    <path d="M1188 94V64M1242 136L1268 119M1242 292L1268 309M1044 292L1018 309M1044 136L1018 119" stroke="#00E5FF" stroke-width="5" stroke-linecap="round" opacity="0.78"/>
  </g>

  <text x="108" y="180" class="sans" font-size="82" font-weight="900" fill="url(#titleGrad)">maomaozhe</text>
  <text x="112" y="229" class="mono" font-size="30" fill="#00E5FF">backend engineer · AI toolmaker · lifelong shipper</text>
  <text x="112" y="282" class="sans" font-size="28" fill="#C9D1D9">Building useful systems with Java, Python, Go, TypeScript, agents, databases, and a little controlled chaos.</text>

  <g class="mono chip">
    <rect x="112" y="324" width="133" height="48" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="138" y="356" fill="#FFB000">Java</text>
    <rect x="263" y="324" width="159" height="48" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="289" y="356" fill="#00E5FF">Python</text>
    <rect x="440" y="324" width="103" height="48" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="466" y="356" fill="#B794F4">Go</text>
    <rect x="561" y="324" width="185" height="48" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="587" y="356" fill="#C9D1D9">AI Agents</text>
    <rect x="764" y="324" width="205" height="48" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="790" y="356" fill="#C9D1D9">Distributed</text>
  </g>

  <g class="mono code" opacity="0.9">
    <text x="890" y="153" fill="#8EA3B8">while (learning) {</text>
    <text x="920" y="190" fill="#C9D1D9">build();</text>
    <text x="920" y="227" fill="#C9D1D9">measure();</text>
    <text x="920" y="264" fill="#C9D1D9">ship();</text>
    <text x="890" y="301" fill="#8EA3B8">}</text>
  </g>

  <path d="M88 398H1312" stroke="url(#stroke)" stroke-width="2" opacity="0.6"/>
  <text x="112" y="432" class="mono tiny" fill="#8EA3B8">One week is 2% of a year · make it count</text>
</svg>
