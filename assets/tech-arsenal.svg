<svg width="1100" height="250" viewBox="0 0 1100 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tech arsenal</title>
  <desc id="desc">Local technology grid for Java, Python, Go, TypeScript, Vue, Spring, Redis, MySQL, Docker, GitHub, Linux, and VS Code.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1100" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1100" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="0.52" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#FFB000"/>
    </linearGradient>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>
  <rect x="1" y="1" width="1098" height="248" rx="24" fill="url(#panel)" stroke="url(#edge)" stroke-width="2"/>
  <text x="44" y="55" class="sans" font-size="31" font-weight="850" fill="#FFFFFF">Tech Arsenal</text>
  <text x="44" y="85" class="mono" font-size="17" fill="#8EA3B8">stack I use to build, automate, debug, and ship</text>

  <g class="sans" font-size="20" font-weight="750">
    <rect x="44" y="116" width="136" height="44" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="80" y="145" fill="#FFB000">Java</text>
    <rect x="196" y="116" width="136" height="44" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="224" y="145" fill="#00E5FF">Python</text>
    <rect x="348" y="116" width="136" height="44" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="398" y="145" fill="#B794F4">Go</text>
    <rect x="500" y="116" width="156" height="44" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="526" y="145" fill="#7DD3FC">TypeScript</text>
    <rect x="672" y="116" width="136" height="44" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="719" y="145" fill="#41B883">Vue</text>
    <rect x="824" y="116" width="232" height="44" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="880" y="145" fill="#C9D1D9">Spring Boot</text>

    <rect x="44" y="178" width="136" height="44" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="83" y="207" fill="#DC382D">Redis</text>
    <rect x="196" y="178" width="136" height="44" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="233" y="207" fill="#4479A1">MySQL</text>
    <rect x="348" y="178" width="136" height="44" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="382" y="207" fill="#2496ED">Docker</text>
    <rect x="500" y="178" width="156" height="44" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="540" y="207" fill="#FFFFFF">GitHub</text>
    <rect x="672" y="178" width="136" height="44" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="709" y="207" fill="#FCC624">Linux</text>
    <rect x="824" y="178" width="232" height="44" rx="14" fill="#101826" stroke="#26324A"/>
    <text x="890" y="207" fill="#007ACC">VS Code</text>
